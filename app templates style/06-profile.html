<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunny Coffee — 06 Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#E9E6E2; font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:48px 24px; }

.phone { width:393px; height:852px; border-radius:54px; box-shadow:0 40px 120px rgba(0,0,0,0.13),0 0 0 1px rgba(0,0,0,0.06),inset 0 0 0 1px rgba(255,255,255,0.8); position:relative; overflow:hidden; background:#F5F3F0; }
.di { position:absolute; top:10px; left:50%; transform:translateX(-50%); width:120px; height:34px; background:#1C1B19; border-radius:20px; z-index:30; }
.status-bar { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:16px 32px 0; font-size:15px; font-weight:500; color:#1C1B19; z-index:30; }

.scroll { position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; padding-bottom:108px; scrollbar-width:none; }
.scroll::-webkit-scrollbar { display:none; }

/* ── HEADER ── */
.header { padding:68px 26px 24px; }
.title { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:300; color:#1C1B19; line-height:1; letter-spacing:-0.01em; }
.title em { font-style:italic; color:#F5A623; }

/* ── NAME CARD ── */
.name-card { margin:0 20px 8px; background:#fff; border-radius:16px; padding:16px 18px; display:flex; align-items:center; gap:14px; box-shadow:0 2px 12px rgba(0,0,0,0.05); }
.avatar { width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,#FEF3E2,#F5A623); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:22px; }
.name-info { flex:1; min-width:0; }
.name-value { font-size:15px; font-weight:600; color:#1C1B19; margin-bottom:2px; }
.name-hint { font-size:11px; color:#B8B4AF; }
.name-edit { width:30px; height:30px; border-radius:8px; background:#F5F3F0; display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; }

/* ── SECTION LABEL ── */
.section-label { padding:18px 26px 8px; font-size:10px; font-weight:600; color:#C0BCB8; letter-spacing:0.08em; text-transform:uppercase; }

/* ── GROUP ── */
.group { margin:0 20px 8px; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.05); }
.row { display:flex; align-items:center; gap:14px; padding:14px 18px; cursor:pointer; }
.row + .row { border-top:1px solid #F3F1EE; }
.row-icon { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.row-label { flex:1; }
.row-title { font-size:14px; font-weight:500; color:#1C1B19; margin-bottom:1px; }
.row-sub { font-size:11px; color:#B8B4AF; }
.row-value { font-size:12px; color:#B8B4AF; margin-right:4px; }
.row-chevron { flex-shrink:0; opacity:0.3; }

/* ── TOGGLE ── */
.toggle { width:44px; height:26px; border-radius:13px; background:#1C1B19; position:relative; flex-shrink:0; cursor:pointer; }
.toggle-knob { width:22px; height:22px; border-radius:11px; background:#fff; position:absolute; top:2px; right:2px; box-shadow:0 1px 4px rgba(0,0,0,0.18); }
.toggle.off { background:#E0DDD9; }
.toggle.off .toggle-knob { transform:translateX(-18px); }

/* ── ABOUT ── */
.about-card { margin:0 20px 8px; background:#fff; border-radius:16px; padding:18px; box-shadow:0 2px 12px rgba(0,0,0,0.05); }
.about-logo { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:300; color:#1C1B19; margin-bottom:4px; }
.about-logo em { font-style:italic; color:#F5A623; }
.about-version { font-size:11px; color:#C0BCB8; margin-bottom:14px; }
.about-links { display:flex; gap:16px; }
.about-link { font-size:12px; color:#9A9690; font-weight:500; text-decoration:none; border-bottom:1px solid #E8E4DF; padding-bottom:1px; }

/* ── BOTTOM NAV ── */
.bnav { position:absolute; bottom:16px; left:20px; right:20px; height:76px; background:rgba(255,255,255,0.2); backdrop-filter:blur(28px) saturate(180%); -webkit-backdrop-filter:blur(28px) saturate(180%); border-radius:28px; border:1px solid rgba(255,255,255,0.5); box-shadow:0 2px 24px rgba(0,0,0,0.08),inset 0 1px 0 rgba(255,255,255,0.65); display:flex; align-items:center; justify-content:space-around; padding-top:4px; z-index:10; overflow:hidden; }
.bshim { position:absolute; top:0; left:10%; right:10%; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9) 30%,rgba(255,255,255,0.9) 70%,transparent); animation:shim 4s ease-in-out infinite; }
@keyframes shim{0%,100%{opacity:.5}50%{opacity:1}}
.bglow { position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.22),rgba(255,255,255,0.04)); border-radius:28px; pointer-events:none; }
.ni { display:flex; flex-direction:column; align-items:center; gap:4px; min-width:60px; position:relative; z-index:1; }
.nlbl { font-size:10px; font-weight:500; color:rgba(60,60,67,0.6); }
.nlbl.on { font-weight:700; color:#1C1B19; }
.ndot { width:4px; height:4px; background:#F5A623; border-radius:50%; }
</style>
</head>
<body>
<div class="phone">
  <div class="di"></div>
  <div class="status-bar">
    <span>9:41</span>
    <div style="display:flex;gap:6px;align-items:center">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#1C1B19"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#1C1B19"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <div class="scroll">
    <div class="header"><div class="title">Your <em>profile</em></div></div>

    <div class="name-card">
      <div class="avatar">☀️</div>
      <div class="name-info">
        <div class="name-value">Magnus</div>
        <div class="name-hint">Only stored on this device</div>
      </div>
      <div class="name-edit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9A9690" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
    </div>

    <div class="section-label">Location</div>
    <div class="group">
      <div class="row">
        <div class="row-icon" style="background:#EEF4FF"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5080D0" stroke-width="1.8" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></div>
        <div class="row-label"><div class="row-title">City</div><div class="row-sub">Used for sun calculations</div></div>
        <span class="row-value">Copenhagen</span>
        <svg class="row-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1C1B19" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="row">
        <div class="row-icon" style="background:#EEF4FF"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5080D0" stroke-width="1.8" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></div>
        <div class="row-label"><div class="row-title">Use my location</div><div class="row-sub">Auto-detect when app opens</div></div>
        <div class="toggle"><div class="toggle-knob"></div></div>
      </div>
    </div>

    <div class="section-label">About</div>
    <div class="about-card">
      <div class="about-logo">sunny <em>coffee</em></div>
      <div class="about-version">Version 1.0.0 · Made in Copenhagen</div>
      <div class="about-links">
        <a class="about-link" href="#">Privacy</a>
        <a class="about-link" href="#">Terms</a>
        <a class="about-link" href="#">Feedback</a>
      </div>
    </div>
  </div>

  <div class="bnav">
    <div class="bshim"></div><div class="bglow"></div>
    <div class="ni"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 9.5V21h7v-6h6v6h7V9.5L12 2z" stroke="#9A9690" stroke-width="1.6" stroke-linejoin="round"/></svg><span class="nlbl">Map</span></div>
    <div class="ni"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7.5" stroke="#9A9690" stroke-width="1.6"/><path d="M17 17l3.5 3.5" stroke="#9A9690" stroke-width="1.6" stroke-linecap="round"/></svg><span class="nlbl">Explore</span></div>
    <div class="ni"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M5 3h14a1 1 0 0 1 1 1v16.5l-8-4-8 4V4a1 1 0 0 1 1-1z" stroke="#9A9690" stroke-width="1.6" stroke-linejoin="round"/></svg><span class="nlbl">Saved</span></div>
    <div class="ni"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="#1C1B19" stroke-width="1.6"/><path d="M4.5 20c0-4 3.358-7 7.5-7s7.5 3 7.5 7" stroke="#1C1B19" stroke-width="1.6" stroke-linecap="round"/></svg><span class="nlbl on">Profile</span><div class="ndot"></div></div>
  </div>
</div>
</body>
</html>
