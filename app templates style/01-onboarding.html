<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunny Coffee — 01 Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#E9E6E2; font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:48px 32px; gap:40px; flex-wrap:wrap; }
.col { display:flex; flex-direction:column; align-items:center; gap:12px; }
.col-label { font-size:10px; font-weight:600; color:#A8A49F; letter-spacing:0.1em; text-transform:uppercase; }

/* ── PHONE ── */
.phone { width:393px; height:852px; border-radius:54px; box-shadow:0 40px 120px rgba(0,0,0,0.13),0 0 0 1px rgba(0,0,0,0.06),inset 0 0 0 1px rgba(255,255,255,0.8); position:relative; overflow:hidden; background:#F5F3F0; display:flex; flex-direction:column; }
.status-bar { display:flex; justify-content:space-between; align-items:center; padding:16px 32px 0; font-size:15px; font-weight:500; color:#1C1B19; flex-shrink:0; position:relative; z-index:10; }
.di { width:120px; height:34px; background:#1C1B19; border-radius:20px; margin:10px auto 0; flex-shrink:0; position:relative; z-index:10; }

/* ── BUTTONS ── */
.btn { width:100%; height:58px; border:none; border-radius:16px; font-family:'DM Sans',sans-serif; font-size:16px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:12px; }
.btn-primary { background:#1C1B19; color:#fff; box-shadow:0 4px 18px rgba(28,27,25,0.15); }
.btn-ghost { background:transparent; color:#B8B4AF; border:1.5px solid #E0DDD9; font-size:14px; height:48px; }
.btn-arrow { width:22px; height:22px; background:#F5A623; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; }

/* ── DOTS ── */
.dots { display:flex; gap:6px; margin-bottom:24px; }
.dot { width:6px; height:6px; border-radius:3px; background:#E0DDD9; }
.dot.on { width:20px; background:#1C1B19; }

/* ══ SCREEN 1 ══ */
.s1-glow { position:absolute; top:0; left:0; right:0; height:380px; background:radial-gradient(ellipse 70% 50% at 50% 18%, #FEF3E2, transparent); pointer-events:none; z-index:0; }
.s1-body { flex:1; display:flex; flex-direction:column; padding:0 36px 52px; position:relative; z-index:1; }
.sun-area { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
.ring { position:absolute; border-radius:50%; border:1px solid rgba(245,166,35,0.13); animation:pulse 3s ease-in-out infinite; }
.ring:nth-child(1){width:280px;height:280px;}
.ring:nth-child(2){width:210px;height:210px;animation-delay:.5s;border-color:rgba(245,166,35,0.2);}
.ring:nth-child(3){width:148px;height:148px;animation-delay:1s;border-color:rgba(245,166,35,0.3);}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.04);opacity:.65}}
.sun-wrap { position:relative; z-index:2; animation:float 4s ease-in-out infinite; }
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.sun-circle { width:96px; height:96px; background:linear-gradient(145deg,#FBBF24,#F5A623); border-radius:50%; box-shadow:0 0 40px rgba(245,166,35,0.4),0 0 80px rgba(245,166,35,0.12); display:flex; align-items:center; justify-content:center; position:relative; }
.sun-rays { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:134px; height:134px; animation:spin 12s linear infinite; }
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.ray { position:absolute; width:3px; height:14px; background:linear-gradient(to bottom,rgba(245,166,35,0.6),transparent); border-radius:2px; top:4px; left:50%; transform-origin:50% 63px; }
.coffee { font-size:36px; filter:brightness(0) invert(1); opacity:.9; }
.city-tag { display:inline-flex; align-items:center; gap:6px; background:#EDEAE6; border-radius:20px; padding:6px 14px; font-size:11px; color:#9A9690; letter-spacing:.05em; text-transform:uppercase; font-weight:500; margin-bottom:18px; }
.city-blink { width:5px; height:5px; background:#F5A623; border-radius:50%; animation:blink 2s ease-in-out infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.app-name { font-family:'Cormorant Garamond',serif; font-size:52px; font-weight:300; color:#1C1B19; line-height:1; letter-spacing:-0.02em; margin-bottom:8px; }
.app-name em { font-style:italic; color:#F5A623; }
.tagline { font-size:15px; color:#B8B4AF; font-weight:300; line-height:1.55; margin-bottom:36px; }

/* ══ SCREEN 2 ══ */
.s2-body { flex:1; display:flex; flex-direction:column; padding:0 36px 52px; align-items:center; }
.illus { flex:1; display:flex; align-items:center; justify-content:center; }
.loc-rings { position:relative; width:200px; height:200px; display:flex; align-items:center; justify-content:center; }
.loc-ring { position:absolute; border-radius:50%; border:1px solid rgba(59,130,246,0.14); animation:ploc 3s ease-in-out infinite; }
.loc-ring:nth-child(1){width:200px;height:200px;}
.loc-ring:nth-child(2){width:148px;height:148px;animation-delay:.5s;border-color:rgba(59,130,246,0.22);}
.loc-ring:nth-child(3){width:96px;height:96px;animation-delay:1s;border-color:rgba(59,130,246,0.32);}
@keyframes ploc{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.55}}
.loc-center { width:56px; height:56px; background:#3B82F6; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 0 24px rgba(59,130,246,0.4); position:relative; z-index:2; }
.perm-title { font-family:'Cormorant Garamond',serif; font-size:38px; font-weight:300; color:#1C1B19; line-height:1.12; margin-bottom:10px; letter-spacing:-0.01em; width:100%; }
.perm-title em { font-style:italic; color:#F5A623; }
.perm-desc { font-size:14px; color:#B8B4AF; line-height:1.65; margin-bottom:28px; width:100%; }
</style>
</head>
<body>

<div class="col">
  <div class="col-label">1 — Welcome</div>
  <div class="phone">
    <div class="s1-glow"></div>
    <div class="status-bar">
      <span>9:41</span>
      <div style="display:flex;gap:6px;align-items:center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#1C1B19"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#1C1B19"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="di"></div>
    <div class="s1-body">
      <div class="sun-area">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="sun-wrap">
          <div class="sun-circle">
            <div class="sun-rays">
              <div class="ray" style="transform:translateX(-50%) rotate(0deg)"></div>
              <div class="ray" style="transform:translateX(-50%) rotate(45deg)"></div>
              <div class="ray" style="transform:translateX(-50%) rotate(90deg)"></div>
              <div class="ray" style="transform:translateX(-50%) rotate(135deg)"></div>
              <div class="ray" style="transform:translateX(-50%) rotate(180deg)"></div>
              <div class="ray" style="transform:translateX(-50%) rotate(225deg)"></div>
              <div class="ray" style="transform:translateX(-50%) rotate(270deg)"></div>
              <div class="ray" style="transform:translateX(-50%) rotate(315deg)"></div>
            </div>
            <span class="coffee">☕</span>
          </div>
        </div>
      </div>
      <div>
        <div class="city-tag"><div class="city-blink"></div>Copenhagen</div>
        <div class="app-name">Sunny<br><em>Coffee</em></div>
        <p class="tagline">Find the warmest seat in the city.<br>Real-time sun for every café.</p>
        <div class="dots"><div class="dot on"></div><div class="dot"></div></div>
        <button class="btn btn-primary">Find my sunny spot <div class="btn-arrow">→</div></button>
      </div>
    </div>
  </div>
</div>

<div class="col">
  <div class="col-label">2 — Location</div>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <div style="display:flex;gap:6px;align-items:center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#1C1B19"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#1C1B19"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="di"></div>
    <div class="s2-body">
      <div class="illus">
        <div class="loc-rings">
          <div class="loc-ring"></div><div class="loc-ring"></div><div class="loc-ring"></div>
          <div class="loc-center">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5" fill="#fff" stroke="none"/></svg>
          </div>
        </div>
      </div>
      <div style="width:100%">
        <div class="perm-title">Allow <em>location</em><br>access</div>
        <div class="perm-desc">Sunny Coffee needs your location to show nearby cafés and calculate sun exposure from where you are.</div>
        <div class="dots"><div class="dot"></div><div class="dot on"></div></div>
        <button class="btn btn-primary">Allow location <div class="btn-arrow">→</div></button>
        <button class="btn btn-ghost">Not now</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
